<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Form Input ke Spreadsheet</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input,
        textarea,
        button {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

    <div class="container">
        <h3>Input Data</h3>
        <form id="form">
            <input type="text" id="nama" placeholder="Nama" required>
            <input type="email" id="email" placeholder="Email" required>
            <textarea id="pesan" placeholder="Pesan" required></textarea>
            <button type="submit">Simpan</button>
        </form>
    </div>

    <script>
        const scriptURL = "https://docs.google.com/spreadsheets/d/1gkbdAfMWM3ti7AUSfaDs7vNRb84WVvI_NeSq_o0UG18/edit?usp=sharing";

        const form = document.getElementById("form");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                nama: document.getElementById("nama").value,
                email: document.getElementById("email").value,
                pesan: document.getElementById("pesan").value
            };

            try {
                const res = await fetch(scriptURL, {
                    method: "POST",
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (result.status === "success") {
                    alert("Data berhasil disimpan!");
                    form.reset();
                }
            } catch (err) {
                alert("Terjadi error!");
                console.error(err);
            }
        });
    </script>

</body>

</html>
